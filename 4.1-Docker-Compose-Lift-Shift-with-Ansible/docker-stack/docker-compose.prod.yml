
## Docker Compose file for VProfile application stack - Production Version (Optimized for Deployment)
services:
  ## ----------------- Database Services (Internal) -----------------
  vprodb:
    image: amrmamer/vprofiledb ## Using pre-built image from Docker Hub for production stability
    container_name: vprodb
    ports:
      - "3306:3306"
    volumes:
      - vprodbdata:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${ROOT_PASSWORD} ## From .env file
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USERNAME} 
      - MYSQL_PASSWORD=${DB_PASSWORD}

    networks:
      - backend_net

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 30s
      timeout: 10s
      retries: 5

## ----------------- Cache Service (Internal) -----------------
  vprocache01:
    image: memcached
    container_name: vprocache01
    ports:
      - "11211:11211"
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/11211' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

## ----------------- Message Queue Service (Internal) -----------
  vpromq01:
    image: rabbitmq:3-management
    container_name: vpromq01
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RMQ_USER} ## From .env file
      - RABBITMQ_DEFAULT_PASS=${RMQ_PASS}
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ----------------- Application Service (The Bridge) -----------------
  vproapp:
    image: amrmamer/vprofileapp
    container_name: vproapp
    ports:
      - "8080:8080"
    volumes:
      - vproappdata:/usr/local/tomcat/webapps

    environment:

      - RDS_HOSTNAME=vprodb ## Using service name as hostname for internal communication within Docker network
      - RDS_USERNAME=${DB_USERNAME}
      - RDS_PASSWORD=${DB_PASSWORD}

      - MEMCACHED_HOSTNAME=vprocache01

      - RABBITMQ_HOSTNAME=vpromq01
      - RABBITMQ_USER=${RMQ_USER}
      - RABBITMQ_PASS=${RMQ_PASS}

    depends_on:
       vprodb:
         condition: service_healthy
       vprocache01:
         condition: service_healthy
       vpromq01:
         condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - frontend_net
      - backend_net

  # ----------------- Frontend Service (Public Facing) -----------------
  vproweb:
    image: amrmamer/vprofileweb
    container_name: vproweb
    ports:
      - "80:80"
    depends_on:
      vproapp:
        condition: service_healthy
    networks:
      - frontend_net

# ----------------- Volumes & Networks Definition -----------------
volumes:
  vprodbdata: {}
  vproappdata: {}

networks:
  frontend_net:
    driver: bridge
  backend_net:
    internal: true