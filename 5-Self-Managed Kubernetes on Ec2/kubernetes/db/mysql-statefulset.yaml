apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vprodb-statefulset ## The name of the statefulset that will be used to base the connection string for the application to connect to the MySQL server
spec:
  serviceName: "vprodb-service" ## The name of the service that will be used to base the connection string for the application to connect to the MySQL server
  replicas: 1
  selector:
    matchLabels:
      app: vprodb ## The selector that will be used to match the statefulset to the service of the MySQL server

  template:
    metadata:
      labels:
        app: vprodb ## The label that will be used to match the statefulset to the service of the MySQL server
    spec:
      containers:
      - name: vprodb
        image: amrmamer/vprofiledb
        ports:
        - name: mysql-port
          containerPort: 3306
          
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m" 

        env:
          - name: MYSQL_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: databases-secrets
                key: root-password

          - name: MYSQL_USER
            valueFrom:
              secretKeyRef:
                name: databases-secrets
                key: username
                
          - name: MYSQL_PASSWORD
            valueFrom:
              secretKeyRef:
                name: databases-secrets
                key: password

        volumeMounts:
        - name: vprodb-data
          mountPath: /var/lib/mysql

  volumeClaimTemplates:
  - metadata:
      name: vprodb-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 2Gi