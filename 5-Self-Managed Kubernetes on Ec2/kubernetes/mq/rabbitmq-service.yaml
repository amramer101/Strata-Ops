apiVersion: v1
kind: Service
metadata:
  name: vprormq-service ## The name of the service that will be used to base the connection string for the application to connect to the RabbitMQ server
spec:
  ports:
    - port: 5672
      targetPort: 5672
    - port: 15672
      targetPort: 15672
  selector:
    app: vprormq-deployment ## The selector that will be used to match the service to the deployment of the RabbitMQ server