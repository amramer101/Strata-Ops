apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vprodb-statefulset 
spec:
  serviceName: {{ .Values.db.serviceName }} ## The name of the service that will be used to base the connection string for the application to connect to the MySQL server
  replicas: 1
  selector:
    matchLabels:
      app: vprodb-statefulset ## The selector that will be used to match the statefulset to the service of the MySQL server

  template:
    metadata:
      labels:
        app: vprodb-statefulset ## The label that will be used to match the statefulset to the service of the MySQL server
    spec:
      containers:
      - name: vprodb
        image: {{ .Values.db.image }}:{{ .Values.db.tag }} ## The image and tag of the MySQL server that will be used to create the container
        ports:
        - name: mysql-port
          containerPort: 3306
          
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m" 

        env:
          - name: MYSQL_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: database-secrets
                key: root-password

          - name: MYSQL_USER
            valueFrom:
              secretKeyRef:
                name: database-secrets
                key: username
                
          - name: MYSQL_PASSWORD
            valueFrom:
              secretKeyRef:
                name: database-secrets
                key: password

        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql

      volumes:
         - name: mysql-storage
           persistentVolumeClaim:
               claimName: mysql-pvc ## The name of the PVC that will be used to claim the PV for the MySQL server