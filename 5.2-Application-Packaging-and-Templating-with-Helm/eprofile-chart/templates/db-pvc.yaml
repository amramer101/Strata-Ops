apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual ## same as the storageClassName defined in the PV
  resources:
    requests:
      storage: {{ .Values.db.storage }} ## The storage capacity of the Persistent Volume Claim that will be used to claim the PV for the MySQL server