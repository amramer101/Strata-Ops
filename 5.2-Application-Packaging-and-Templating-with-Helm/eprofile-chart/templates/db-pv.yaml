apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysql-pv
spec:
  capacity:
    storage: {{ .Values.db.storage }} ## The storage capacity of the Persistent Volume that will be used to store the data of the MySQL server
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: "/mnt/vprofile-db" ## The path on the host machine where the EBS volume is mounted